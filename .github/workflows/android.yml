name: Android CI/APK Build

on:
  push:
    branches: [ "main" ]  # 当你向 main 分支提交代码时触发
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest  # 使用 GitHub 提供的 Linux 环境

    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # 拉取你的代码

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug  # 编译生成 Debug 版 APK

    - name: Upload APK
      uses: actions/upload-artifact@v4  # 将生成的 APK 上传到 GitHub 界面供下载
      with:
        name: my-app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
